<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telegram AI Chart Analyzer System</title>

  <meta name="description" content="AI-powered Telegram chart analyzer system. Private access for BD & Global traders."/>
  <meta property="og:title" content="Telegram AI Chart Analyzer System"/>
  <meta property="og:description" content="Join private AI trading analysis system on Telegram."/>
  <meta property="og:type" content="website"/>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Poppins,sans-serif;
      background:linear-gradient(120deg,#050505,#0d0d0d,#050505);
      color:#fff;
      overflow:hidden;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      background:radial-gradient(circle at 20% 20%,rgba(255,87,34,.15),transparent 40%),
                 radial-gradient(circle at 80% 80%,rgba(30,136,229,.15),transparent 40%);
      animation:bg 10s infinite alternate;
      z-index:-1;
    }

    @keyframes bg{
      from{transform:translateY(0)}
      to{transform:translateY(-50px)}
    }

    .wrap{
      max-width:520px;
      margin:auto;
      padding:30px 20px;
      text-align:center;
    }

    .logo{
      width:100px;height:100px;
      margin:20px auto;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      background:linear-gradient(135deg,#ff9800,#ff3d00);
      box-shadow:0 0 35px rgba(255,61,0,.5);
    }

    .badge{
      display:inline-block;
      padding:6px 14px;
      font-size:12px;
      border-radius:30px;
      background:rgba(33,150,243,.2);
      color:#90caf9;
    }

    h1{
      font-size:26px;
      margin:15px 0;
    }

    .highlight{
      background:linear-gradient(90deg,#ff9800,#ff3d00);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p{
      font-size:14px;
      color:#cfcfcf;
      line-height:1.6;
    }

    .btn{
      display:block;
      margin:18px 0;
      padding:16px;
      border-radius:14px;
      text-decoration:none;
      color:#fff;
      font-weight:600;
      transition:.3s;
    }

    .btn:hover{transform:scale(1.03)}

    .primary{
      background:linear-gradient(90deg,#ff5722,#ff3d00);
    }

    .secondary{
      background:linear-gradient(90deg,#1e88e5,#1565c0);
    }

    .countdown{
      margin-top:15px;
      font-size:14px;
      color:#ffcc80;
    }

    .box{
      margin-top:20px;
      padding:14px;
      background:rgba(255,255,255,.05);
      border-radius:14px;
      font-size:13px;
      color:#bbb;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="logo">AI</div>

    <div class="badge">BD 🇧🇩 + GLOBAL 🌍 SYSTEM</div>

    <h1><span class="highlight">Telegram AI</span><br/>Chart Analyzer</h1>

    <p>Advanced AI trading analysis system built for smart traders.</p>

    <a class="btn primary" href="https://t.me/+Cg5U_vnaeXdmMGQ8">🤖 Enter AI BOT</a>
    <a class="btn secondary" href="https://t.me/+3NylXTrJl7I1ZTdl">📊 Enter Analyzer</a>

    <div class="countdown">
      🚀 Redirecting in <span id="t">5</span> seconds...
    </div>

    <div class="box">
      ⚠️ Private access system • Educational use only
    </div>

  </div>

  <script>
    let t = 5;
    const el = document.getElementById("t");

    const timer = setInterval(() => {
      t--;
      el.textContent = t;

      if(t <= 0){
        clearInterval(timer);
        window.location.replace("https://t.me/+Cg5U_vnaeXdmMGQ8");
      }
    }, 1000);
  </script>

</body>
</html>
