<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(120deg,#050505,#0d0d0d);
  color:#fff;
  text-align:center;
}

.container{
  max-width:500px;
  margin:auto;

.highlight{
  background:linear-gradient(90deg,#ff9800,#ff3d00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  font-size:14px;
  color:#ccc;
  line-height:1.6;
}

.btn{
  display:block;
  margin:15px auto;

  color:#fff;

.primary{
  background:linear-gradient(90deg,#ff5722,#ff3d00);
}

.secondary{
  background:linear-gradient(90deg,#1e88e5,#1565c0);
}

.box{
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,.03);
  border-radius:14px;

.footer{
